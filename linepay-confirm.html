<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LINE Pay 付款處理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Helvetica Neue",Arial,"PingFang TC","Microsoft JhengHei",sans-serif;
  background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.08);
  max-width:380px;width:calc(100% - 32px);padding:40px 28px;text-align:center}
.icon{font-size:56px;margin-bottom:16px}
.title{font-size:22px;font-weight:800;color:#333;margin-bottom:8px}
.msg{font-size:14px;color:#888;line-height:1.6;margin-bottom:24px}
.orderno{font-size:18px;font-weight:700;color:#06C755;background:#f0faf4;
  padding:8px 20px;border-radius:10px;display:inline-block;margin-bottom:20px}
.btn{display:inline-block;background:#06C755;color:#fff;font-weight:700;font-size:15px;
  padding:12px 32px;border-radius:12px;text-decoration:none;transition:.15s}
.btn:hover{background:#05b34c;transform:scale(1.02)}
.btn.cancel{background:#999}
.btn.cancel:hover{background:#777}
.spinner{width:48px;height:48px;border:4px solid #e5e5e5;border-top-color:#06C755;
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#e53935}
</style>
</head>
<body>

<div class="card" id="app">
  <!-- 載入中 -->
  <div id="loading">
    <div class="spinner"></div>
    <p class="title">付款處理中...</p>
    <p class="msg">正在確認您的 LINE Pay 付款，請稍候</p>
  </div>

  <!-- 成功 -->
  <div id="success" style="display:none">
    <div class="icon">✅</div>
    <p class="title">付款成功！</p>
    <p class="msg">感謝您使用 LINE Pay 付款</p>
    <div class="orderno" id="orderInfo"></div>
    <br><br>
    <a class="btn" id="backBtn" href="javascript:void(0)">返回點餐頁面</a>
  </div>

  <!-- 取消 -->
  <div id="cancelled" style="display:none">
    <div class="icon">🔙</div>
    <p class="title">付款已取消</p>
    <p class="msg">您已取消此次 LINE Pay 付款<br>訂單仍然保留，您可以選擇店內付款</p>
    <a class="btn cancel" id="cancelBackBtn" href="javascript:void(0)">返回</a>
  </div>

  <!-- 錯誤 -->
  <div id="error" style="display:none">
    <div class="icon">⚠️</div>
    <p class="title error">付款處理異常</p>
    <p class="msg" id="errorMsg"></p>
    <a class="btn cancel" id="errorBackBtn" href="javascript:void(0)">返回</a>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQqI6p8e8-lxz3mOBRaWUPxyVES_83KBI",
  authDomain: "breakfast-ai-system.firebaseapp.com",
  databaseURL: "https://breakfast-ai-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "breakfast-ai-system",
  storageBucket: "breakfast-ai-system.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 解析 URL 參數 ──
const params = new URLSearchParams(window.location.search);
const orderId = params.get('orderId');
const action = params.get('action');           // confirm 或 cancel
const transactionId = params.get('transactionId');

function showView(id) {
  ['loading', 'success', 'cancelled', 'error'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}

function getBackUrl() {
  // 嘗試從 referrer 或 localStorage 取得返回 URL
  const stored = localStorage.getItem('linepay_return_url');
  if (stored) {
    localStorage.removeItem('linepay_return_url');
    return stored;
  }
  // 預設回首頁
  const base = window.location.pathname.replace(/\/[^/]*$/, '/');
  return base + 'index.html';
}

async function processPayment() {
  if (!orderId) {
    document.getElementById('errorMsg').textContent = '缺少訂單編號';
    showView('error');
    return;
  }

  // 設定返回按鈕
  const backUrl = getBackUrl();
  document.getElementById('backBtn').href = backUrl;
  document.getElementById('cancelBackBtn').href = backUrl;
  document.getElementById('errorBackBtn').href = backUrl;

  // ── 取消 ──
  if (action === 'cancel') {
    try {
      await update(ref(db, `orders/${orderId}`), {
        paymentStatus: 'cancelled'
      });
      await update(ref(db, `linepay_transactions/${orderId}`), {
        status: 'cancelled',
        cancelledAt: Date.now()
      });
    } catch (e) {
      console.error('更新取消狀態失敗:', e);
    }
    showView('cancelled');
    return;
  }

  // ── 確認付款 ──
  try {
    // 從 Firebase 取得交易資訊
    const txnSnap = await get(ref(db, `linepay_transactions/${orderId}`));
    if (!txnSnap.exists()) {
      document.getElementById('errorMsg').textContent = '找不到交易記錄';
      showView('error');
      return;
    }

    const txnData = txnSnap.val();
    const txnId = transactionId || txnData.transactionId;
    const amount = txnData.amount;

    if (!txnId || !amount) {
      document.getElementById('errorMsg').textContent = '交易資料不完整';
      showView('error');
      return;
    }

    // 寫入確認請求 → 背景 Worker 會自動處理
    await set(ref(db, `linepay_confirms/${orderId}`), {
      transactionId: String(txnId),
      amount: amount,
      orderId: orderId,
      timestamp: Date.now()
    });

    console.log('✅ 確認請求已寫入 Firebase');

    // 等待背景 Worker 處理（最多 15 秒）
    let confirmed = false;
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, 500));
      const statusSnap = await get(ref(db, `linepay_transactions/${orderId}/status`));
      if (statusSnap.exists() && statusSnap.val() === 'confirmed') {
        confirmed = true;
        break;
      }
      // 也檢查是否確認失敗
      if (statusSnap.exists() && statusSnap.val() === 'confirm_failed') {
        const errSnap = await get(ref(db, `linepay_transactions/${orderId}/error`));
        document.getElementById('errorMsg').textContent =
          errSnap.exists() ? errSnap.val() : '付款確認失敗';
        showView('error');
        return;
      }
    }

    if (confirmed) {
      // 取得訂單編號
      const orderSnap = await get(ref(db, `orders/${orderId}/orderNo`));
      const orderNo = orderSnap.exists() ? orderSnap.val() : '';
      if (orderNo) {
        document.getElementById('orderInfo').textContent =
          `訂單 No.${String(orderNo).padStart(3, '0')}`;
      } else {
        document.getElementById('orderInfo').textContent =
          `訂單 #${orderId.slice(-4).toUpperCase()}`;
      }
      showView('success');
    } else {
      // 超時但可能仍在處理中
      document.getElementById('orderInfo').textContent = '付款正在處理中';
      document.getElementById('success').querySelector('.title').textContent = '付款處理中';
      document.getElementById('success').querySelector('.msg').textContent =
        '您的付款正在確認中，請稍後在訂單中查看付款狀態';
      showView('success');
    }

  } catch (e) {
    console.error('付款處理異常:', e);
    document.getElementById('errorMsg').textContent = '系統異常：' + e.message;
    showView('error');
  }
}

// 啟動
processPayment();
</script>

</body>
</html>
