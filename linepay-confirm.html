<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>LINE Pay 付款處理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Helvetica Neue",Arial,"PingFang TC","Microsoft JhengHei",sans-serif;
  background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.08);
  max-width:380px;width:calc(100% - 32px);padding:40px 28px;text-align:center}
.icon{font-size:56px;margin-bottom:16px}
.title{font-size:22px;font-weight:800;color:#333;margin-bottom:8px}
.msg{font-size:14px;color:#888;line-height:1.6;margin-bottom:24px}
.orderno{font-size:18px;font-weight:700;color:#06C755;background:#f0faf4;
  padding:8px 20px;border-radius:10px;display:inline-block;margin-bottom:20px}
.btn{display:inline-block;background:#06C755;color:#fff;font-weight:700;font-size:15px;
  padding:12px 32px;border-radius:12px;text-decoration:none;transition:.15s}
.btn:hover{background:#05b34c;transform:scale(1.02)}
.btn.cancel{background:#999}
.btn.cancel:hover{background:#777}
.spinner{width:48px;height:48px;border:4px solid #e5e5e5;border-top-color:#06C755;
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#e53935}
</style>
</head>
<body>

<div class="card" id="app">
  <!-- 載入中 -->
  <div id="loading">
    <div class="spinner"></div>
    <p class="title">付款處理中...</p>
    <p class="msg">正在確認您的 LINE Pay 付款，請稍候</p>
  </div>

  <!-- 成功 -->
  <div id="success" style="display:none">
    <div class="icon">✅</div>
    <p class="title">付款成功！</p>
    <p class="msg">感謝您使用 LINE Pay 付款</p>
    <p class="msg" id="pickupTimeInfo" style="display:none;color:#333;font-weight:500;margin-bottom:4px;"></p>
    <p class="msg" id="orderTimeInfo" style="display:none;color:#333;font-weight:500;margin-bottom:8px;"></p>
    <p id="phoneReminder" style="display:none;font-size:18px;font-weight:900;color:#f97316;margin-bottom:20px;">取餐請告知電話末3碼</p>
    <a class="btn" id="backBtn" href="javascript:void(0)">返回點餐頁面</a>
    <a class="btn" id="closePosBtn" href="javascript:void(0)" style="display:none;margin-top:8px" onclick="try{window.close();}catch(e){}">可關閉此視窗</a>
  </div>

  <!-- 取消 -->
  <div id="cancelled" style="display:none">
    <div class="icon">🔙</div>
    <p class="title">付款已取消</p>
    <p class="msg">您已取消此次 LINE Pay 付款<br>訂單仍然保留，您可以選擇店內付款</p>
    <a class="btn cancel" id="cancelBackBtn" href="javascript:void(0)">返回</a>
  </div>

  <!-- 錯誤 -->
  <div id="error" style="display:none">
    <div class="icon">⚠️</div>
    <p class="title error">付款處理異常</p>
    <p class="msg" id="errorMsg"></p>
    <a class="btn cancel" id="errorBackBtn" href="javascript:void(0)">返回</a>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQqI6p8e8-lxz3mOBRaWUPxyVES_83KBI",
  authDomain: "breakfast-ai-system.firebaseapp.com",
  databaseURL: "https://breakfast-ai-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "breakfast-ai-system",
  storageBucket: "breakfast-ai-system.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ── 解析 URL 參數 ──
const params = new URLSearchParams(window.location.search);
const orderId = params.get('orderId');
const action = params.get('action');           // confirm 或 cancel
const transactionId = params.get('transactionId');
const callbackToken = params.get('callbackToken') || '';
const callbackAmount = Number(params.get('amount') || 0);
const callbackOrderDateKey = params.get('orderDateKey') || '';

function showView(id) {
  ['loading', 'success', 'cancelled', 'error'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}

function safeStorageGet(key) {
  try { return localStorage.getItem(key); } catch (e) { return null; }
}
function safeStorageRemove(key) {
  try { localStorage.removeItem(key); } catch (e) {}
}
function waitForExistingIdToken(timeoutMs = 5000) {
  if (auth.currentUser) return auth.currentUser.getIdToken().catch(() => '');
  return new Promise(resolve => {
    let settled = false;
    let unsubscribe = () => {};
    let timer = null;
    const finish = value => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      unsubscribe();
      resolve(value || '');
    };
    timer = setTimeout(() => finish(''), timeoutMs);
    unsubscribe = onAuthStateChanged(auth, user => {
      if (!user) return;
      user.getIdToken().then(finish).catch(() => finish(''));
    }, () => finish(''));
  });
}
function firebaseRestUrl(baseUrl, path, idToken) {
  const url = new URL(`${baseUrl}/${path.replace(/^\/+/, '')}.json`);
  if (idToken) url.searchParams.set('auth', idToken);
  return url.toString();
}
function showConfirmationPending() {
  document.getElementById('success').querySelector('.title').textContent = '付款確認中';
  document.getElementById('success').querySelector('.msg').textContent =
    '已收到 LINE Pay 回傳，後端正在向 LINE Pay 核對；確認完成前不會標示為已付款';
  document.getElementById('phoneReminder').style.display = 'none';
  showView('success');
}
function getBackUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  const returnPage = urlParams.get('returnPage');
  const deviceId = urlParams.get('deviceId');
  const base = window.location.pathname.replace(/\/[^/]*$/, '/');
  const rawDevice = String(deviceId || '').trim();
  let decodedDevice = '';
  if (rawDevice) {
    try { decodedDevice = decodeURIComponent(rawDevice); } catch (e) { decodedDevice = rawDevice; }
  }

  // 電話端防呆：即使 returnPage 被舊版誤填成 pos/admin，只要 deviceId 已是 dashboard URL 仍優先返回電話主頁
  if (decodedDevice && /^https?:\/\//i.test(decodedDevice) && /:1880\/dashboard\//i.test(decodedDevice)) {
    return decodedDevice;
  }

  if (returnPage === 'pos') return base + 'pos.html';
  if (returnPage === 'admin') return base + 'admin.html';

  if (returnPage === 'dinein') {
    const storedDinein = safeStorageGet('linepay_return_url');
    if (storedDinein) {
      safeStorageRemove('linepay_return_url');
      return storedDinein;
    }
    if (deviceId) return base + 'dinein.html?deviceId=' + deviceId;
    return base + 'dinein.html';
  }

  if (returnPage === 'phone') {
    if (decodedDevice) {
      if (/^https?:\/\//i.test(decodedDevice)) return decodedDevice;
      if (/^\/[^/]/.test(decodedDevice)) return decodedDevice;
    }
  }

  if (returnPage === 'index') return base + 'index.html';

  const stored = safeStorageGet('linepay_return_url');
  if (stored) {
    safeStorageRemove('linepay_return_url');
    return stored;
  }
  return base + 'index.html';
}

async function processPayment() {
  if (!orderId) {
    document.getElementById('errorMsg').textContent = '缺少訂單編號';
    showView('error');
    return;
  }

  // 設定返回按鈕
  const backUrl = getBackUrl();
  const isPosClose = (backUrl === '__close__');
  if (isPosClose) {
    document.getElementById('backBtn').style.display = 'none';
    document.getElementById('closePosBtn').style.display = 'inline-block';
    document.getElementById('cancelBackBtn').href = 'javascript:try{window.close();}catch(e){}';
    document.getElementById('errorBackBtn').href = 'javascript:try{window.close();}catch(e){}';
  } else {
    document.getElementById('backBtn').href = backUrl;
    document.getElementById('cancelBackBtn').href = backUrl;
    document.getElementById('errorBackBtn').href = backUrl;
  }

  // ── 取消 ──
  if (action === 'cancel') {
    // 取消導回只代表顧客離開付款頁，不能由瀏覽器改寫金流交易狀態。
    showView('cancelled');
    return;
  }

  // ── 確認付款 ──
  try {
    const txnId = String(transactionId || '').trim();
    const amount = callbackAmount;
    const orderDateKey = callbackOrderDateKey;
    const _dbUrl = 'https://breakfast-ai-system-default-rtdb.asia-southeast1.firebasedatabase.app';

    if (!txnId) {
      document.getElementById('errorMsg').textContent = '付款回跳資料不完整，請聯絡店員核對';
      showView('error');
      return;
    }

    const callbackMetadataComplete =
      Number.isFinite(amount) && amount > 0 &&
      /^[a-f0-9]{32}$/i.test(callbackToken) &&
      /^\d{4}-\d{2}-\d{2}$/.test(orderDateKey);
    if (!callbackMetadataComplete) {
      // LINE Pay 規格只保證帶回 orderId/transactionId；其餘 query 遺失時由 Pi 官方狀態查詢備援確認。
      showConfirmationPending();
      return;
    }

    // callbackToken 是建立交易時由後端產生的一次性能力憑證；
    // Firebase 規則會同時核對交易編號、金額與日期。
    const dbRestUrl = 'https://breakfast-ai-system-default-rtdb.asia-southeast1.firebasedatabase.app';
    let writeOk = false;
    for (let retry = 0; retry < 3; retry++) {
      try {
        const wRes = await fetch(`${dbRestUrl}/linepay_confirms/${orderId}.json`, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            transactionId: String(txnId),
            amount: Number(amount),
            orderId: orderId,
            orderDateKey: orderDateKey,
            callbackToken: callbackToken,
            status: 'pending',
            timestamp: Date.now()
          })
        });
        if (!wRes.ok) throw new Error('HTTP ' + wRes.status);
        writeOk = true;
        break;
      } catch(e) {
        console.error('寫入 confirms 失敗(retry '+retry+'):', e);
        await new Promise(r => setTimeout(r, 1000));
      }
    }

    if (!writeOk) {
      document.getElementById('errorMsg').textContent = '無法寫入確認請求，請聯絡店員';
      showView('error');
      return;
    }

    try { history.replaceState(null, '', window.location.pathname); } catch (e) {}

    // 僅原下單者或店員可讀交易狀態；沒有既有 Firebase 身分時保持「確認中」。
    const idToken = await waitForExistingIdToken();
    if (!idToken) {
      showConfirmationPending();
      return;
    }

    let confirmed = false;
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, 1500));
      try {
        const res = await fetch(firebaseRestUrl(dbRestUrl, `linepay_transactions/${orderId}/status`, idToken));
        const st = await res.json();
        if (st === 'confirmed') { confirmed = true; break; }
        if (st === 'confirm_failed') {
          try {
            const errRes = await fetch(firebaseRestUrl(dbRestUrl, `linepay_transactions/${orderId}/error`, idToken));
            const errMsg = await errRes.json();
            document.getElementById('errorMsg').textContent = errMsg || '付款確認失敗';
          } catch(e) {
            document.getElementById('errorMsg').textContent = '付款確認失敗';
          }
          showView('error');
          return;
        }
      } catch(e) { /* 繼續等待 */ }
    }

    if (confirmed) {
      try {
        const orderPath = `orders/${orderDateKey}/${orderId}`;
        const orderRes = await fetch(firebaseRestUrl(_dbUrl, orderPath, idToken));
        const orderData = await orderRes.json();
        if (orderData) {
          const dayNames = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
          if (orderData.pickupDate || orderData.pickupTime) {
            let pickupStr = '';
            if (orderData.pickupDate) {
              const pd = new Date(orderData.pickupDate + 'T00:00:00');
              pickupStr = `${pd.getFullYear()}/${String(pd.getMonth()+1).padStart(2,'0')}/${String(pd.getDate()).padStart(2,'0')}(${dayNames[pd.getDay()]}) ${orderData.pickupTime || ''}`;
            } else { pickupStr = orderData.pickupTime || ''; }
            const el = document.getElementById('pickupTimeInfo');
            el.textContent = '取餐時間：' + pickupStr; el.style.display = 'block';
          }
          if (orderData.timestamp) {
            const od = new Date(orderData.timestamp);
            const el2 = document.getElementById('orderTimeInfo');
            el2.textContent = '下單時間：' + `${od.getFullYear()}/${String(od.getMonth()+1).padStart(2,'0')}/${String(od.getDate()).padStart(2,'0')} ${String(od.getHours()).padStart(2,'0')}:${String(od.getMinutes()).padStart(2,'0')}`;
            el2.style.display = 'block';
          }
        }
      } catch(e) { console.error(e); }
      document.getElementById('phoneReminder').style.display = 'block';
      showView('success');
      if (isPosClose) { setTimeout(function(){ try{window.close();}catch(e){} }, 3000); }
    } else {
      showConfirmationPending();
    }

  } catch (e) {
    console.error('付款處理異常:', e);
    document.getElementById('errorMsg').textContent = '系統異常：' + e.message;
    showView('error');
  }
}

// 啟動
processPayment();
</script>

</body>
</html>
