<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LINE Pay 付款處理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Helvetica Neue",Arial,"PingFang TC","Microsoft JhengHei",sans-serif;
  background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.08);
  max-width:380px;width:calc(100% - 32px);padding:40px 28px;text-align:center}
.icon{font-size:56px;margin-bottom:16px}
.title{font-size:22px;font-weight:800;color:#333;margin-bottom:8px}
.msg{font-size:14px;color:#888;line-height:1.6;margin-bottom:24px}
.orderno{font-size:18px;font-weight:700;color:#06C755;background:#f0faf4;
  padding:8px 20px;border-radius:10px;display:inline-block;margin-bottom:20px}
.btn{display:inline-block;background:#06C755;color:#fff;font-weight:700;font-size:15px;
  padding:12px 32px;border-radius:12px;text-decoration:none;transition:.15s}
.btn:hover{background:#05b34c;transform:scale(1.02)}
.btn.cancel{background:#999}
.btn.cancel:hover{background:#777}
.spinner{width:48px;height:48px;border:4px solid #e5e5e5;border-top-color:#06C755;
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#e53935}
</style>
</head>
<body>

<div class="card" id="app">
  <!-- 載入中 -->
  <div id="loading">
    <div class="spinner"></div>
    <p class="title">付款處理中...</p>
    <p class="msg">正在確認您的 LINE Pay 付款，請稍候</p>
  </div>

  <!-- 成功 -->
  <div id="success" style="display:none">
    <div class="icon">✅</div>
    <p class="title">付款成功！</p>
    <p class="msg">感謝您使用 LINE Pay 付款</p>
    <p class="msg" id="pickupTimeInfo" style="display:none;color:#333;font-weight:500;margin-bottom:4px;"></p>
    <p class="msg" id="orderTimeInfo" style="display:none;color:#333;font-weight:500;margin-bottom:8px;"></p>
    <p id="phoneReminder" style="display:none;font-size:18px;font-weight:900;color:#f97316;margin-bottom:20px;">取餐請告知電話末3碼</p>
    <a class="btn" id="backBtn" href="javascript:void(0)">返回點餐頁面</a>
  </div>

  <!-- 取消 -->
  <div id="cancelled" style="display:none">
    <div class="icon">🔙</div>
    <p class="title">付款已取消</p>
    <p class="msg">您已取消此次 LINE Pay 付款<br>訂單仍然保留，您可以選擇店內付款</p>
    <a class="btn cancel" id="cancelBackBtn" href="javascript:void(0)">返回</a>
  </div>

  <!-- 錯誤 -->
  <div id="error" style="display:none">
    <div class="icon">⚠️</div>
    <p class="title error">付款處理異常</p>
    <p class="msg" id="errorMsg"></p>
    <a class="btn cancel" id="errorBackBtn" href="javascript:void(0)">返回</a>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQqI6p8e8-lxz3mOBRaWUPxyVES_83KBI",
  authDomain: "breakfast-ai-system.firebaseapp.com",
  databaseURL: "https://breakfast-ai-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "breakfast-ai-system",
  storageBucket: "breakfast-ai-system.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 解析 URL 參數 ──
const params = new URLSearchParams(window.location.search);
const orderId = params.get('orderId');
const action = params.get('action');           // confirm 或 cancel
const transactionId = params.get('transactionId');

function showView(id) {
  ['loading', 'success', 'cancelled', 'error'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}

function safeStorageGet(key) {
  try { return localStorage.getItem(key); } catch (e) { return null; }
}
function safeStorageRemove(key) {
  try { localStorage.removeItem(key); } catch (e) {}
}
function getBackUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  const returnPage = urlParams.get('returnPage');
  const deviceId   = urlParams.get('deviceId');
  const base = window.location.pathname.replace(/\/[^/]*$/, '/');

  if (returnPage === 'pos') return base + 'pos.html';
  if (returnPage === 'admin') return base + 'admin.html';

  if (returnPage === 'dinein') {
    // ★ 優先用 localStorage（手機自己跳轉模式，4-5/4-6）
    //   手機在跳轉 LINE Pay 前就存好了 window.location.href（含 ?table=6）
    const stored = safeStorageGet('linepay_return_url');
    if (stored) {
      safeStorageRemove('linepay_return_url');
      return stored;   // e.g. dinein.html?table=6
    }
    // ★ 沒有 localStorage（不同手機掃 QR，4-3/4-4）→ 用 deviceId 返回
    if (deviceId) return base + 'dinein.html?deviceId=' + deviceId;
    return base + 'dinein.html';
  }

  if (returnPage === 'index') return base + 'index.html';

  // 其他：從 localStorage 讀取
  const stored = safeStorageGet('linepay_return_url');
  if (stored) {
    safeStorageRemove('linepay_return_url');
    return stored;
  }
  return base + 'index.html';
}

async function processPayment() {
  if (!orderId) {
    document.getElementById('errorMsg').textContent = '缺少訂單編號';
    showView('error');
    return;
  }

  // 設定返回按鈕
  const backUrl = getBackUrl();
  document.getElementById('backBtn').href = backUrl;
  document.getElementById('cancelBackBtn').href = backUrl;
  document.getElementById('errorBackBtn').href = backUrl;

  // ── 取消 ──
  if (action === 'cancel') {
    try {
      await update(ref(db, `orders/${orderId}`), {
        paymentStatus: 'pending'
      });
      await update(ref(db, `linepay_transactions/${orderId}`), {
        status: 'cancelled',
        cancelledAt: Date.now()
      });
    } catch (e) {
      console.error('更新取消狀態失敗:', e);
    }
    showView('cancelled');
    return;
  }

  // ── 確認付款 ──
  try {
    // 從 URL 取得 transactionId（LINE Pay 回傳）
    const urlTxnId = new URLSearchParams(window.location.search).get('transactionId');
    
    // 先嘗試從 URL 取得，再從 Firebase 取
    let txnId = urlTxnId || transactionId || '';
    let amount = 0;

    // 從 Firebase 取得交易資訊（最多重試 3 次）
    for (let retry = 0; retry < 3; retry++) {
      try {
        const txnSnap = await get(ref(db, `linepay_transactions/${orderId}`));
        if (txnSnap.exists()) {
          const txnData = txnSnap.val();
          txnId = txnId || txnData.transactionId || '';
          amount = txnData.amount || 0;
          break;
        }
      } catch(e) {
        console.error('讀取交易記錄失敗(retry '+retry+'):', e);
        await new Promise(r => setTimeout(r, 1000));
      }
    }

    if (!txnId || !amount) {
      document.getElementById('errorMsg').textContent = '找不到交易記錄 (orderId:' + orderId + ')';
      showView('error');
      return;
    }

    // 寫入確認請求 → 背景 Worker 會自動處理（最多重試 3 次）
    let writeOk = false;
    for (let retry = 0; retry < 3; retry++) {
      try {
        await set(ref(db, `linepay_confirms/${orderId}`), {
          transactionId: String(txnId),
          amount: Number(amount),
          orderId: orderId,
          timestamp: Date.now()
        });
        writeOk = true;
        break;
      } catch(e) {
        console.error('寫入 confirms 失敗(retry '+retry+'):', e);
        await new Promise(r => setTimeout(r, 1000));
      }
    }

    if (!writeOk) {
      document.getElementById('errorMsg').textContent = '無法寫入確認請求，請聯絡店員';
      showView('error');
      return;
    }

    // 等待背景 Worker 處理（最多 20 秒）
    let confirmed = false;
    for (let i = 0; i < 40; i++) {
      await new Promise(r => setTimeout(r, 500));
      try {
        const statusSnap = await get(ref(db, `linepay_transactions/${orderId}/status`));
        if (statusSnap.exists() && statusSnap.val() === 'confirmed') {
          confirmed = true;
          break;
        }
        if (statusSnap.exists() && statusSnap.val() === 'confirm_failed') {
          const errSnap = await get(ref(db, `linepay_transactions/${orderId}/error`));
          document.getElementById('errorMsg').textContent =
            errSnap.exists() ? errSnap.val() : '付款確認失敗';
          showView('error');
          return;
        }
      } catch(e) { /* 繼續等待 */ }
    }

    if (confirmed) {
      // 取得訂單資料（取餐時間、下單時間）
      try {
        const orderSnap = await get(ref(db, `orders/${orderId}`));
        if (orderSnap.exists()) {
          const orderData = orderSnap.val();
          const dayNames = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
          // 取餐時間
          if (orderData.pickupDate || orderData.pickupTime) {
            let pickupStr = '';
            if (orderData.pickupDate) {
              const pd = new Date(orderData.pickupDate + 'T00:00:00');
              const pyyyy = pd.getFullYear();
              const pmm = String(pd.getMonth()+1).padStart(2,'0');
              const pdd = String(pd.getDate()).padStart(2,'0');
              const dow = dayNames[pd.getDay()];
              pickupStr = `${pyyyy}/${pmm}/${pdd}(${dow}) ${orderData.pickupTime || ''}`;
            } else {
              pickupStr = orderData.pickupTime || '';
            }
            const pickupEl = document.getElementById('pickupTimeInfo');
            pickupEl.textContent = '取餐時間：' + pickupStr;
            pickupEl.style.display = 'block';
          }
          // 下單時間
          if (orderData.timestamp) {
            const od = new Date(orderData.timestamp);
            const oyyyy = od.getFullYear();
            const omm = String(od.getMonth()+1).padStart(2,'0');
            const odd = String(od.getDate()).padStart(2,'0');
            const ohh = String(od.getHours()).padStart(2,'0');
            const omin = String(od.getMinutes()).padStart(2,'0');
            const orderTimeEl = document.getElementById('orderTimeInfo');
            orderTimeEl.textContent = '下單時間：' + `${oyyyy}/${omm}/${odd} ${ohh}:${omin}`;
            orderTimeEl.style.display = 'block';
          }
        }
      } catch(e) { console.error('讀取訂單資料失敗:', e); }
      document.getElementById('phoneReminder').style.display = 'block';
      showView('success');
    } else {
      // 超時但可能仍在處理中
      document.getElementById('success').querySelector('.title').textContent = '付款處理中';
      document.getElementById('success').querySelector('.msg').textContent =
        '您的付款正在確認中，請稍後在訂單中查看付款狀態';
      showView('success');
    }

  } catch (e) {
    console.error('付款處理異常:', e);
    document.getElementById('errorMsg').textContent = '系統異常：' + e.message;
    showView('error');
  }
}

// 啟動
processPayment();
</script>

</body>
</html>
