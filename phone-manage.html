<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>&#x96FB;&#x8A71;&#x9EDE;&#x9910;&#x7BA1;&#x7406;&#x5F8C;&#x53F0;</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at top right,#1e293b 0%,#0f172a 60%);color:var(--text);font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif}
    .wrap{max-width:1480px;margin:0 auto;padding:16px;min-height:100vh}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .top h1{margin:0;font-size:26px}
    .top p{margin:4px 0 0;color:var(--muted);font-size:12px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .sp{flex:1}
    .chip{padding:6px 10px;border:1px solid var(--line);border-radius:999px;background:#0b1220;color:#93c5fd;font-size:12px}
    .panel{margin-top:10px;background:rgba(17,24,39,.9);border:1px solid #1f2937;border-radius:14px;padding:12px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .tab{padding:8px 12px;border-radius:10px;border:1px solid var(--line);background:#0b1220;color:var(--muted);font-weight:800;cursor:pointer}
    .tab.active{background:#0b2a3a;color:#fff;border-color:#0ea5e9}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .list{display:grid;gap:8px;max-height:62vh;overflow:auto;padding-right:4px}
    .item{border:1px solid var(--line);background:#0b1220;border-radius:12px;padding:10px}
    .ih{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .name{font-size:14px;font-weight:800}
    .sub{font-size:12px;color:var(--muted)}
    .ctrl{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .mini{min-width:32px;height:30px;border-radius:8px;border:1px solid var(--line);background:#1f2937;color:#cbd5e1;font-weight:900;cursor:pointer}
    .btn{padding:8px 12px;border-radius:10px;border:1px solid var(--line);background:#1f2937;color:var(--text);font-weight:700;cursor:pointer}
    .btn.ok{background:#065f46;border-color:#10b981}
    .btn.warn{background:#78350f;border-color:#f59e0b}
    .btn.danger{background:#7f1d1d;border-color:#ef4444}
    .btn.primary{background:#0369a1;border-color:#0ea5e9}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .field,select,textarea{width:100%;padding:9px 10px;border-radius:10px;border:1px solid var(--line);background:#0b1220;color:var(--text);font-size:13px;outline:none}
    textarea{min-height:170px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .login{max-width:460px;margin:8vh auto 0;border:1px solid var(--line);border-radius:14px;padding:14px;background:rgba(15,23,42,.92);display:grid;gap:10px}
    .ok{color:#86efac;font-size:12px}
    .err{color:#fda4af;font-size:12px}
    .hint{font-size:12px;color:var(--muted);line-height:1.45}
    .choice{display:grid;grid-template-columns:1fr 110px auto;gap:8px;align-items:center}
    @media (max-width:1080px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="app" class="wrap">
    <div class="top">
      <div>
        <h1>&#x96FB;&#x8A71;&#x9EDE;&#x9910;&#x7BA1;&#x7406;&#x5F8C;&#x53F0;</h1>
        <p>&#x8CC7;&#x6599;&#x5BEB;&#x5165; Firebase&#xFF1A;<code>menu</code>&#x3001;<code>settings/categories</code>&#x3001;<code>settings/optionTemplates</code></p>
      </div>
      <div class="row" v-if="user">
        <span class="chip">{{ user.email }}</span>
        <button class="btn" @click="reloadAll" :disabled="loading">&#x91CD;&#x65B0;&#x8F09;&#x5165;</button>
        <button class="btn danger" @click="logout">&#x767B;&#x51FA;</button>
      </div>
    </div>

    <div v-if="!user" class="login">
      <h3 style="margin:0">&#x767B;&#x5165;</h3>
      <input class="field" v-model.trim="loginEmail" placeholder="Email" />
      <input class="field" type="password" v-model="loginPassword" placeholder="Password" />
      <button class="btn primary" @click="login" :disabled="authLoading">&#x767B;&#x5165;</button>
      <div class="err" v-if="authError">{{ authError }}</div>
      <div class="hint">&#x8ACB;&#x4F7F;&#x7528; <code>manage.html</code> &#x76F8;&#x540C;&#x7684;&#x7BA1;&#x7406;&#x5E33;&#x865F;&#x8207;&#x5BC6;&#x78BC;&#x3002;</div>
    </div>

    <div v-else class="panel">
      <div class="tabs">
        <button class="tab" :class="{active:tab==='categories'}" @click="tab='categories'">&#x5206;&#x985E;&#x7BA1;&#x7406;</button>
        <button class="tab" :class="{active:tab==='menu'}" @click="tab='menu'">&#x9910;&#x9EDE;&#x6392;&#x5E8F;&#x8207; OptionGroups</button>
        <button class="tab" :class="{active:tab==='templates'}" @click="tab='templates'">&#x9078;&#x9805;&#x6A21;&#x677F;</button>
      </div>

      <template v-if="tab==='categories'">
        <div class="hint">&#x8ABF;&#x6574;&#x9806;&#x5E8F;&#x5F8C;&#xFF0C;&#x8ACB;&#x6309;&#x300C;&#x5132;&#x5B58;&#x5206;&#x985E;&#x300D;&#x3002;</div>
        <div class="list" style="max-height:70vh">
          <div class="item" v-for="(cat,idx) in categoriesDraft" :key="'c'+idx">
            <div class="ih">
              <div class="name">{{ cat }}</div>
              <div class="ctrl">
                <button class="mini" @click="moveCategory(idx,-1)" :disabled="idx===0">Up</button>
                <button class="mini" @click="moveCategory(idx,1)" :disabled="idx===categoriesDraft.length-1">Dn</button>
                <button class="mini" @click="removeCategory(idx)">Del</button>
              </div>
            </div>
          </div>
        </div>
        <div class="row" style="margin-top:10px">
          <input class="field" style="max-width:320px" v-model.trim="newCategory" placeholder="&#x65B0;&#x589E;&#x5206;&#x985E;" />
          <button class="btn" @click="addCategory">&#x65B0;&#x589E;&#x5206;&#x985E;</button>
          <button class="btn ok" @click="saveCategories" :disabled="saving.categories">&#x5132;&#x5B58;&#x5206;&#x985E;</button>
          <span class="ok" v-if="saved.categories">{{ saved.categories }}</span>
        </div>
      </template>

      <template v-else-if="tab==='menu'">
        <div class="grid">
          <section>
            <div class="hint">&#x8ABF;&#x6574;&#x9806;&#x5E8F;&#x5F8C;&#xFF0C;&#x8ACB;&#x6309;&#x300C;&#x5132;&#x5B58;&#x9910;&#x9EDE;&#x6392;&#x5E8F;&#x300D;&#x3002;</div>
            <div class="row" style="margin-bottom:8px">
              <select class="field" style="max-width:280px" v-model="menuFilterCategory">
                <option value="">&#x5168;&#x90E8;&#x5206;&#x985E;</option>
                <option v-for="cat in categoryOptions" :key="'f'+cat" :value="cat">{{ cat }}</option>
              </select>
              <button class="btn ok" @click="saveMenuSort" :disabled="saving.menuSort">&#x5132;&#x5B58;&#x9910;&#x9EDE;&#x6392;&#x5E8F;</button>
              <span class="ok" v-if="saved.menuSort">{{ saved.menuSort }}</span>
            </div>
            <div class="list">
              <div class="item" v-for="(m,idx) in filteredMenuItems" :key="m.id">
                <div class="ih">
                  <div>
                    <div class="name">{{ m.name || m.label }}</div>
                    <div class="sub">{{ m.category || '\u672a\u5206\u985e' }} | ${{ Number(m.price||0) }}</div>
                  </div>
                  <div class="ctrl">
                    <button class="mini" @click="moveMenuByFilteredIndex(idx,-1)" :disabled="idx===0">Up</button>
                    <button class="mini" @click="moveMenuByFilteredIndex(idx,1)" :disabled="idx===filteredMenuItems.length-1">Dn</button>
                    <button class="btn" @click="openMenuOptionEditor(m.id)">OptionGroups</button>
                  </div>
                </div>
              </div>
            </div>
          </section>
          <section>
            <div v-if="!editingMenuItem" class="sub">&#x8ACB;&#x5148;&#x5F9E;&#x5DE6;&#x5074;&#x9078;&#x4E00;&#x500B;&#x9910;&#x9EDE;&#x3002;</div>
            <template v-else>
              <div class="item" style="margin-bottom:8px">
                <div class="name">{{ editingMenuItem.name || editingMenuItem.label }}</div>
                <div class="sub">{{ editingMenuItem.category || '\u672a\u5206\u985e' }}</div>
                <div class="row">
                  <select class="field" style="max-width:300px" v-model="selectedTemplateIdToApply">
                    <option value="">&#x9644;&#x52A0;&#x6A21;&#x677F;&#x5230; optionGroups</option>
                    <option v-for="tpl in templatesSorted" :key="'a'+tpl.id" :value="tpl.id">{{ tpl.templateName }} ({{ tpl.groupName }})</option>
                  </select>
                  <button class="btn warn" @click="applyTemplateToMenuOptionGroups">&#x5957;&#x7528;&#x6A21;&#x677F;</button>
                </div>
              </div>
              <textarea v-model="menuOptionGroupsDraftJson"></textarea>
              <div class="row" style="margin-top:8px">
                <button class="btn" @click="formatMenuOptionGroupsJson">&#x683C;&#x5F0F;&#x5316; JSON</button>
                <button class="btn ok" @click="saveMenuOptionGroups" :disabled="saving.menuOptionGroups">&#x5132;&#x5B58; OptionGroups</button>
                <span class="ok" v-if="saved.menuOptionGroups">{{ saved.menuOptionGroups }}</span>
              </div>
              <div class="err" v-if="menuOptionGroupsError">{{ menuOptionGroupsError }}</div>
            </template>
          </section>
        </div>
      </template>

      <template v-else-if="tab==='templates'">
        <div class="grid">
          <section>
            <div class="row" style="margin-bottom:8px">
              <button class="btn" @click="newTemplate">&#x65B0;&#x589E;&#x6A21;&#x677F;</button>
              <button class="btn ok" @click="saveTemplateOrder" :disabled="saving.templateOrder">&#x5132;&#x5B58;&#x6A21;&#x677F;&#x6392;&#x5E8F;</button>
              <span class="ok" v-if="saved.templateOrder">{{ saved.templateOrder }}</span>
            </div>
            <div class="list">
              <div class="item" v-for="(tpl,idx) in templatesSorted" :key="tpl.id">
                <div class="ih">
                  <div>
                    <div class="name">{{ tpl.templateName }}</div>
                    <div class="sub">{{ tpl.groupName }} | {{ tpl.pricing }} | {{ tpl.type }}</div>
                  </div>
                  <div class="ctrl">
                    <button class="mini" @click="moveTemplate(idx,-1)" :disabled="idx===0">Up</button>
                    <button class="mini" @click="moveTemplate(idx,1)" :disabled="idx===templatesSorted.length-1">Dn</button>
                    <button class="btn" @click="editTemplate(tpl.id)">&#x7DE8;&#x8F2F;</button>
                    <button class="btn danger" @click="deleteTemplate(tpl.id)">&#x522A;&#x9664;</button>
                  </div>
                </div>
              </div>
            </div>
          </section>
          <section>
            <div class="item">
              <input class="field" v-model.trim="templateForm.templateName" placeholder="&#x6A21;&#x677F;&#x540D;&#x7A31;" />
              <input class="field" v-model.trim="templateForm.groupName" placeholder="&#x7FA4;&#x7D44;&#x540D;&#x7A31;" />
              <div class="row">
                <select class="field" v-model="templateForm.type" style="max-width:170px"><option value="radio">radio</option><option value="checkbox">checkbox</option></select>
                <select class="field" v-model="templateForm.pricing" style="max-width:220px"><option value="setPrice">setPrice</option><option value="addDelta">addDelta</option><option value="mealUpgrade">mealUpgrade</option></select>
                <input class="field" type="number" min="0" v-model.number="templateForm.baseValue" style="max-width:140px" placeholder="baseValue" />
                <input class="field" type="number" min="0" v-model.number="templateForm.defaultIdx" style="max-width:140px" placeholder="defaultIdx" />
              </div>
              <div class="sub">choices</div>
              <div class="choice" v-for="(ch,idx) in templateForm.choices" :key="'ch'+idx">
                <input class="field" v-model.trim="ch.name" placeholder="&#x9078;&#x9805;&#x540D;&#x7A31;" />
                <input class="field" type="number" min="0" v-model.number="ch.price" placeholder="price" />
                <div class="ctrl"><button class="mini" @click="moveChoice(idx,-1)" :disabled="idx===0">Up</button><button class="mini" @click="moveChoice(idx,1)" :disabled="idx===templateForm.choices.length-1">Dn</button><button class="mini" @click="removeChoice(idx)">Del</button></div>
              </div>
              <div class="row">
                <button class="btn" @click="addChoice">&#x65B0;&#x589E;&#x9078;&#x9805;</button>
                <button class="btn warn" @click="fillChoicesFromStandardDrinks">&#x5F9E; standardDrinks &#x5E36;&#x5165;</button>
                <span class="sp"></span>
                <button class="btn ok" @click="saveTemplate" :disabled="saving.template">&#x5132;&#x5B58;&#x6A21;&#x677F;</button>
              </div>
              <div class="err" v-if="templateError">{{ templateError }}</div>
              <div class="ok" v-if="saved.template">{{ saved.template }}</div>
            </div>
          </section>
        </div>
      </template>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, get, update, push, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
    import { getAuth, setPersistence, browserLocalPersistence, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    const firebaseConfig={apiKey:"AIzaSyCQqI6p8e8-lxz3mOBRaWUPxyVES_83KBI",authDomain:"breakfast-ai-system.firebaseapp.com",databaseURL:"https://breakfast-ai-system-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"breakfast-ai-system",storageBucket:"breakfast-ai-system.firebasestorage.app",messagingSenderId:"662477350736",appId:"1:662477350736:web:7e3dd6128a6f66a52aae55"};
    const app=initializeApp(firebaseConfig),db=getDatabase(app),auth=getAuth(app); setPersistence(auth,browserLocalPersistence).catch(()=>{});
    const { createApp } = Vue;
    createApp({
      data(){return{user:null,tab:"categories",loading:false,authLoading:false,authError:"",loginEmail:localStorage.getItem("phone_manage_email")||"",loginPassword:"",
        menuItems:[],categoriesDraft:[],newCategory:"",optionTemplates:[],standardDrinks:[],menuFilterCategory:"",editingMenuItemId:"",
        menuOptionGroupsDraftJson:"[]",menuOptionGroupsError:"",selectedTemplateIdToApply:"",templateEditingId:"",templateError:"",
        templateForm:{templateName:"",groupName:"",type:"radio",pricing:"setPrice",baseValue:0,defaultIdx:0,choices:[{name:"",price:0}]},
        saving:{categories:false,menuSort:false,menuOptionGroups:false,templateOrder:false,template:false},
        saved:{categories:"",menuSort:"",menuOptionGroups:"",templateOrder:"",template:""}}},
      computed:{
        categoryOptions(){return Array.from(new Set([...(this.categoriesDraft||[]),...this.menuItems.map(i=>String(i.category||"").trim()).filter(Boolean)]));},
        sortedMenuItems(){return this.menuItems.slice().sort((a,b)=>{const sa=Number.isFinite(Number(a.sortOrder))?Number(a.sortOrder):1e9;const sb=Number.isFinite(Number(b.sortOrder))?Number(b.sortOrder):1e9; if(sa!==sb)return sa-sb; return String(a.name||a.label||"").localeCompare(String(b.name||b.label||""),"zh-Hant");});},
        filteredMenuItems(){return this.menuFilterCategory?this.sortedMenuItems.filter(i=>String(i.category||"")===this.menuFilterCategory):this.sortedMenuItems;},
        editingMenuItem(){return this.menuItems.find(i=>i.id===this.editingMenuItemId)||null;},
        templatesSorted(){return this.optionTemplates.slice().sort((a,b)=>(Number.isFinite(Number(a.sortOrder))?Number(a.sortOrder):1e9)-(Number.isFinite(Number(b.sortOrder))?Number(b.sortOrder):1e9));}
      },
      mounted(){onAuthStateChanged(auth,async u=>{this.user=u||null;if(u) await this.reloadAll();});},
      methods:{
        clone(v){return JSON.parse(JSON.stringify(v||null));},
        resetSaved(){this.saved={categories:"",menuSort:"",menuOptionGroups:"",templateOrder:"",template:""};},
        normalizeMenu(obj){const d=(obj&&typeof obj==="object")?obj:{};return Object.entries(d).map(([id,it])=>({id,...(it||{})}));},
        normalizeTpl(obj){const d=(obj&&typeof obj==="object")?obj:{};return Object.entries(d).map(([id,it])=>({id,...(it||{})}));},
        reindexMenu(){this.sortedMenuItems.forEach((it,idx)=>{const t=this.menuItems.find(x=>x.id===it.id); if(t) t.sortOrder=idx;});},
        reindexTpl(){this.templatesSorted.forEach((it,idx)=>{const t=this.optionTemplates.find(x=>x.id===it.id); if(t) t.sortOrder=idx;});},
        async login(){this.authError=""; if(!this.loginEmail||!this.loginPassword){this.authError="\u8acb\u8f38\u5165 Email \u8207 Password\u3002"; return;} this.authLoading=true; try{await signInWithEmailAndPassword(auth,this.loginEmail,this.loginPassword); localStorage.setItem("phone_manage_email",this.loginEmail); this.loginPassword="";}catch(e){this.authError="\u767b\u5165\u5931\u6557\uff1a"+(e&&e.message?e.message:"unknown error");} finally{this.authLoading=false;}},
        async logout(){await signOut(auth);},
        async reloadAll(){this.loading=true; this.resetSaved(); try{
          const [s,m,t,d]=await Promise.all([get(ref(db,"settings")),get(ref(db,"menu")),get(ref(db,"settings/optionTemplates")),get(ref(db,"settings/standardDrinks"))]);
          const settings=s.exists()?s.val():{}; this.categoriesDraft=Array.isArray(settings.categories)?settings.categories.slice():[];
          this.menuItems=this.normalizeMenu(m.exists()?m.val():{}); this.optionTemplates=this.normalizeTpl(t.exists()?t.val():{}); this.standardDrinks=Array.isArray(d.val())?d.val():[];
          if(!this.editingMenuItemId&&this.sortedMenuItems.length) this.openMenuOptionEditor(this.sortedMenuItems[0].id); else if(this.editingMenuItemId) this.openMenuOptionEditor(this.editingMenuItemId);
        }catch(e){alert("\u8f09\u5165\u8cc7\u6599\u5931\u6557\uff1a"+(e&&e.message?e.message:"unknown error"));} finally{this.loading=false;}},
        addCategory(){const v=String(this.newCategory||"").trim(); if(!v||this.categoriesDraft.includes(v))return; this.categoriesDraft.push(v); this.newCategory="";},
        removeCategory(i){this.categoriesDraft.splice(i,1);},
        moveCategory(i,d){const n=i+d; if(n<0||n>=this.categoriesDraft.length)return; const t=this.categoriesDraft[i]; this.categoriesDraft.splice(i,1); this.categoriesDraft.splice(n,0,t);},
        async saveCategories(){this.saving.categories=true; this.saved.categories=""; try{await update(ref(db,"settings"),{categories:this.categoriesDraft.slice()}); this.saved.categories="\u5df2\u5132\u5b58"; }catch(e){alert("\u5132\u5b58\u5206\u985e\u5931\u6557\uff1a"+(e&&e.message?e.message:"unknown error"));} finally{this.saving.categories=false;}},
        openMenuOptionEditor(id){this.menuOptionGroupsError=""; this.editingMenuItemId=id; const item=this.menuItems.find(i=>i.id===id); const g=Array.isArray(item&&item.optionGroups)?item.optionGroups:[]; this.menuOptionGroupsDraftJson=JSON.stringify(g,null,2);},
        moveMenuByFilteredIndex(i,d){this.reindexMenu(); const list=this.filteredMenuItems,a=list[i],b=list[i+d]; if(!a||!b)return; const ta=this.menuItems.find(x=>x.id===a.id),tb=this.menuItems.find(x=>x.id===b.id); if(!ta||!tb)return; const sa=Number(ta.sortOrder||0); ta.sortOrder=Number(tb.sortOrder||0); tb.sortOrder=sa;},
        async saveMenuSort(){this.saving.menuSort=true; this.saved.menuSort=""; try{this.reindexMenu(); const up={}; this.sortedMenuItems.forEach((it,idx)=>up["menu/"+it.id+"/sortOrder"]=idx); await update(ref(db),up); this.saved.menuSort="\u5df2\u5132\u5b58"; await this.reloadAll();}catch(e){alert("\u5132\u5b58\u9910\u9ede\u6392\u5e8f\u5931\u6557\uff1a"+(e&&e.message?e.message:"unknown error"));} finally{this.saving.menuSort=false;}},
        formatMenuOptionGroupsJson(){this.menuOptionGroupsError=""; try{const p=JSON.parse(this.menuOptionGroupsDraftJson||"[]"); if(!Array.isArray(p)) throw new Error("optionGroups \u5fc5\u9808\u662f\u9663\u5217"); this.menuOptionGroupsDraftJson=JSON.stringify(p,null,2);}catch(e){this.menuOptionGroupsError="JSON \u683c\u5f0f\u932f\u8aa4\uff1a"+(e&&e.message?e.message:"unknown error");}},
        applyTemplateToMenuOptionGroups(){this.menuOptionGroupsError=""; if(!this.selectedTemplateIdToApply)return; const tpl=this.optionTemplates.find(t=>t.id===this.selectedTemplateIdToApply); if(!tpl)return; try{const p=JSON.parse(this.menuOptionGroupsDraftJson||"[]"); if(!Array.isArray(p)) throw new Error("optionGroups \u5fc5\u9808\u662f\u9663\u5217"); p.push({templateId:tpl.id,templateName:tpl.templateName||"",groupName:tpl.groupName||"",type:tpl.type||"radio",pricing:tpl.pricing||"addDelta",baseValue:Number(tpl.baseValue||0),defaultIdx:Number(tpl.defaultIdx||0),choices:this.clone(Array.isArray(tpl.choices)?tpl.choices:[])}); this.menuOptionGroupsDraftJson=JSON.stringify(p,null,2);}catch(e){this.menuOptionGroupsError="\u5957\u7528\u6a21\u677f\u5931\u6557\uff1a"+(e&&e.message?e.message:"unknown error");}},
        async saveMenuOptionGroups(){this.saving.menuOptionGroups=true; this.saved.menuOptionGroups=""; this.menuOptionGroupsError=""; try{const item=this.editingMenuItem; if(!item) throw new Error("\u5c1a\u672a\u9078\u64c7\u9910\u9ede"); const p=JSON.parse(this.menuOptionGroupsDraftJson||"[]"); if(!Array.isArray(p)) throw new Error("optionGroups \u5fc5\u9808\u662f\u9663\u5217"); await update(ref(db,"menu/"+item.id),{optionGroups:p}); this.saved.menuOptionGroups="\u5df2\u5132\u5b58"; await this.reloadAll();}catch(e){this.menuOptionGroupsError="\u5132\u5b58\u5931\u6557\uff1a"+(e&&e.message?e.message:"unknown error");} finally{this.saving.menuOptionGroups=false;}},
        moveTemplate(i,d){this.reindexTpl(); const list=this.templatesSorted,a=list[i],b=list[i+d]; if(!a||!b)return; const ta=this.optionTemplates.find(x=>x.id===a.id),tb=this.optionTemplates.find(x=>x.id===b.id); if(!ta||!tb)return; const sa=Number(ta.sortOrder||0); ta.sortOrder=Number(tb.sortOrder||0); tb.sortOrder=sa;},
        async saveTemplateOrder(){this.saving.templateOrder=true; this.saved.templateOrder=""; try{this.reindexTpl(); const up={}; this.templatesSorted.forEach((t,idx)=>up["settings/optionTemplates/"+t.id+"/sortOrder"]=idx); await update(ref(db),up); this.saved.templateOrder="\u5df2\u5132\u5b58"; await this.reloadAll();}catch(e){alert("\u5132\u5b58\u6a21\u677f\u6392\u5e8f\u5931\u6557\uff1a"+(e&&e.message?e.message:"unknown error"));} finally{this.saving.templateOrder=false;}},
        newTemplate(){this.templateEditingId=""; this.templateError=""; this.templateForm={templateName:"",groupName:"",type:"radio",pricing:"setPrice",baseValue:0,defaultIdx:0,choices:[{name:"",price:0}]};},
        editTemplate(id){const t=this.optionTemplates.find(x=>x.id===id); if(!t)return; this.templateEditingId=id; this.templateError=""; this.templateForm={templateName:t.templateName||"",groupName:t.groupName||"",type:t.type||"radio",pricing:t.pricing||"setPrice",baseValue:Number(t.baseValue||0),defaultIdx:Number(t.defaultIdx||0),choices:this.clone(Array.isArray(t.choices)?t.choices:[{name:"",price:0}])};},
        async deleteTemplate(id){if(!confirm("\u78ba\u5b9a\u8981\u522a\u9664\u6b64\u6a21\u677f\uff1f")) return; try{await remove(ref(db,"settings/optionTemplates/"+id)); await this.reloadAll();}catch(e){alert("\u522a\u9664\u5931\u6557\uff1a"+(e&&e.message?e.message:"unknown error"));}},
        addChoice(){this.templateForm.choices.push({name:"",price:0});},
        removeChoice(i){this.templateForm.choices.splice(i,1);},
        moveChoice(i,d){const a=this.templateForm.choices,n=i+d; if(n<0||n>=a.length)return; const t=a[i]; a.splice(i,1); a.splice(n,0,t);},
        fillChoicesFromStandardDrinks(){if(!Array.isArray(this.standardDrinks)||!this.standardDrinks.length)return; const c=this.standardDrinks.map(d=>({name:String((d&&d.name)||"").trim(),price:Number((d&&d.price)||0)})).filter(x=>x.name); this.templateForm.choices=c.length?c:[{name:"",price:0}];},
        async saveTemplate(){this.saving.template=true; this.saved.template=""; this.templateError=""; try{
          const f=this.templateForm,p={templateName:String(f.templateName||"").trim(),groupName:String(f.groupName||"").trim(),type:String(f.type||"radio"),pricing:String(f.pricing||"setPrice"),baseValue:Number(f.baseValue||0),defaultIdx:Math.max(0,Number(f.defaultIdx||0)),choices:(Array.isArray(f.choices)?f.choices:[]).map(c=>({name:String((c&&c.name)||"").trim(),price:Number((c&&c.price)||0)})).filter(c=>c.name)};
          if(!p.templateName) throw new Error("\u8acb\u8f38\u5165\u6a21\u677f\u540d\u7a31"); if(!p.groupName) throw new Error("\u8acb\u8f38\u5165\u7fa4\u7d44\u540d\u7a31"); if(!p.choices.length) throw new Error("\u81f3\u5c11\u9700\u8981\u4e00\u500b\u9078\u9805");
          let sortOrder=this.optionTemplates.length; if(this.templateEditingId){const t=this.optionTemplates.find(x=>x.id===this.templateEditingId); sortOrder=Number((t&&t.sortOrder)||0);}
          const payload={...p,sortOrder}; if(this.templateEditingId) await update(ref(db,"settings/optionTemplates/"+this.templateEditingId),payload); else await push(ref(db,"settings/optionTemplates"),payload);
          this.saved.template="\u5df2\u5132\u5b58"; await this.reloadAll();
        }catch(e){this.templateError=e&&e.message?e.message:"\u5132\u5b58\u6a21\u677f\u5931\u6557";} finally{this.saving.template=false;}}
      }
    }).mount("#app");
  </script>
