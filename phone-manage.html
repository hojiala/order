    * { box-sizing: border-box; }
    body {
      margin: 0;

      display: grid;
      place-items: center;
      background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 60%);
      color: var(--text);

      padding: 22px;
      box-shadow: 0 20px 48px rgba(0,0,0,.25);
    }
    h1 { margin: 0 0 8px; font-size: 28px; font-weight: 900; }
    p { margin: 0; line-height: 1.7; color: var(--muted); }
    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(34,197,94,.12);
      border: 1px solid rgba(34,197,94,.5);
      color: #86efac;
    }
    .warn {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(245,158,11,.08);
      border: 1px solid rgba(245,158,11,.4);
      color: #fde68a;
      font-size: 14px;
      font-weight: 700;
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      min-height: 44px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      background: #1f2937;
    }
    .btn.primary {
      border-color: #0ea5e9;
      background: #0369a1;
    }
    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: #cbd5e1;
    }
    code {
      padding: 2px 6px;
      border-radius: 6px;
      background: #0b1220;
      border: 1px solid #334155;
      color: #e2e8f0;
      font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
